    <!-- JSON-LD: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://mybuffer.ca/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">

      "@context": "https://schema.org",

      "address": {
        "@type": "PostalAddress",

      },
      "contactPoint": {
        "@type": "ContactPoint",

    <!-- JSON-LD: FinancialService -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FinancialService",
      "name": "Buffer Credit Line",
      "url": "https://mybuffer.ca/",
      "provider": {
        "@type": "Organization",
        "name": "Buffer"
      },
      "description": "A lower-rate credit line that automatically replaces high-interest credit card debt, reducing your effective APR and accelerating your debt payoff timeline.",
      "areaServed": {
        "@type": "Country",
        "name": "Canada"
      },
      "offers": {
        "@type": "Offer",
        "description": "Credit line with APR ranging from 14%–18% depending on credit profile",
        "areaServed": "CA",
        "priceCurrency": "CAD"
      }
    }
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Buffer safe to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Buffer uses bank-level security with 256-bit encryption to protect your data. We're regulated by federal and provincial authorities and your information is never shared without your permission."
          }
        },
        {
          "@type": "Question",
          "name": "How does Buffer affect my credit score?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Buffer can help improve your credit score by reducing your credit utilization ratio and ensuring on-time payments. Most users see their credit score improve within the first few months."
          }
        },
        {
          "@type": "Question",
          "name": "I'm having trouble with the app. What should I do?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Contact our support team at hello@mybuffer.ca or through the in-app chat feature. We're here to help 24/7."
          }
        },
        {
          "@type": "Question",
          "name": "Who is Buffer designed for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Buffer is ideal for anyone with credit card debt who wants to save money on interest, improve their credit score, and pay off debt faster."
          }
        },
        {
          "@type": "Question",
          "name": "What are the requirements to join Buffer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You need to be 18 or older, have a steady income, a valid bank account, and a credit score of at least 600 to qualify."
          }
        },
        {
          "@type": "Question",
          "name": "Is Buffer a bank?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No, Buffer is not a bank. We're a financial technology company that partners with banks to offer credit lines."
          }
        },
        {
          "@type": "Question",
          "name": "How does Buffer make money?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Buffer makes money from the interest on credit lines we provide. We keep our rates low and transparent with no hidden fees."
          }
        },
        {
          "@type": "Question",
          "name": "Is Buffer available in my province?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Buffer is available in most provinces. Check our website or app for the most current list of supported provinces."
          }
        },
        {
          "@type": "Question",
          "name": "Is Buffer a debt consolidation service?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Buffer offers balance transfer credit lines that can help consolidate multiple credit card debts into one lower-rate payment."
          }
        },
        {
          "@type": "Question",
          "name": "How do I close my account?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You can close your account through the app settings or by contacting our support team at hello@mybuffer.ca."
          }
        }
      ]
    }
    </script>
  </head>
